const statusColors = {

  Filming: "#EF4444", Editing: "#6366F1", "Client Review": "#EC4899",
  Revisions: "#F97316", Delivered: "#10B981", Archived: "#6B7280",
};
const taskStatusColors = {
  "Not Started": "#9CA3AF", "In Progress": "#3B82F6",
  "Waiting on Client": "#F59E0B", Completed: "#10B981", Overdue: "#EF4444",
};
const priorityColors = { Low: "#10B981", Medium: "#3B82F6", High: "#F59E0B", Urgent: "#EF4444" };


function calcProgress(tasks) {
  const all = STAGE_KEYS.flatMap(k => tasks[k] || []);
  if (!all.length) return 0;
  return Math.round((all.filter(t => t.completed).length / all.length) * 100);
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / 86400000);
}

function fmt(dateStr) {
  if (!dateStr) return "—";
  return new Date(dateStr).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({ projects, setView, setSelectedProject }) {
  const active = projects.filter(p => !["Delivered","Archived"].includes(p.status));
  const overdue = projects.filter(p => p.deliveryDeadline && daysUntil(p.deliveryDeadline) < 0 && p.status !== "Delivered");
  const dueSoon = projects.filter(p => {
    const d = daysUntil(p.deliveryDeadline);
    return d !== null && d >= 0 && d <= 7;
  });

  const stats = [
    { label: "Active Projects", value: active.length, color: BRAND },
    { label: "Overdue", value: overdue.length, color: "#EF4444" },
    { label: "Due This Week", value: dueSoon.length, color: "#F59E0B" },
    { label: "Delivered", value: projects.filter(p => p.status === "Delivered").length, color: "#10B981" },
  ];

  return (
    <div>
      <div style={{ marginBottom: "1.5rem" }}>
        <h1 style={{ fontSize: 22, fontWeight: 800, color: "#111", margin: 0 }}>Dashboard</h1>
        <p style={{ color: "#6B7280", fontSize: 14, margin: "4px 0 0" }}>
          {new Date().toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}
        </p>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 24 }}>
        {stats.map(s => (
          <div key={s.label} style={{ ...styles.card, borderTop: `3px solid ${s.color}` }}>
            <div style={{ fontSize: 28, fontWeight: 800, color: s.color }}>{s.value}</div>
            <div style={{ fontSize: 13, color: "#6B7280", marginTop: 2 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {(overdue.length > 0 || dueSoon.length > 0) && (
        <div style={{ background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 10, padding: "12px 16px", marginBottom: 20 }}>
          <div style={{ fontWeight: 700, color: "#B91C1C", fontSize: 13, marginBottom: 6 }}>⚠ Attention Required</div>
          {overdue.map(p => (
            <div key={p.id} style={{ fontSize: 13, color: "#991B1B", marginBottom: 2 }}>
              <strong>{p.name}</strong> — deadline was {fmt(p.deliveryDeadline)} ({Math.abs(daysUntil(p.deliveryDeadline))} days overdue)
            </div>
          ))}
          {dueSoon.map(p => (
            <div key={p.id} style={{ fontSize: 13, color: "#92400E", marginBottom: 2 }}>
              <strong>{p.name}</strong> — due in {daysUntil(p.deliveryDeadline)} days ({fmt(p.deliveryDeadline)})
            </div>
          ))}
        </div>
      )}

      <div style={{ ...styles.card, marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h2 style={{ fontSize: 15, fontWeight: 700, margin: 0 }}>Active Projects</h2>
          <button style={styles.btn("ghost")} onClick={() => setView("projects")}>View all →</button>
        </div>
        <ProjectTable projects={active.slice(0, 5)} onSelect={p => { setSelectedProject(p); setView("project_detail"); }} />
      </div>
    </div>
  );
}

// ─── Project Table ────────────────────────────────────────────────────────────
function ProjectTable({ projects, onSelect }) {
  return (
    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
      <thead>
        <tr style={{ background: "#F9FAFB" }}>
          {["Project","Client","Type","Location","Shoot Date","Deadline","Status","Priority","Progress"].map(h => (
            <th key={h} style={{ padding: "8px 10px", textAlign: "left", fontWeight: 600, color: "#6B7280", borderBottom: "1px solid #F1F1F1", whiteSpace: "nowrap" }}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {projects.map(p => {
          const days = daysUntil(p.deliveryDeadline);
          const isOverdue = days !== null && days < 0 && p.status !== "Delivered";
          const isSoon = days !== null && days >= 0 && days <= 3;
          return (
            <tr key={p.id} onClick={() => onSelect(p)}
              style={{ cursor: "pointer", borderBottom: "1px solid #F9FAFB", transition: "background 0.1s" }}
              onMouseEnter={e => e.currentTarget.style.background = "#FAFAFA"}
              onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
              <td style={{ padding: "10px", fontWeight: 600, color: "#111", maxWidth: 160, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</td>
              <td style={{ padding: "10px", color: "#374151", maxWidth: 130, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.client}</td>
              <td style={{ padding: "10px" }}><span style={{ fontSize: 11, color: "#6B7280" }}>{p.jobType}</span></td>
              <td style={{ padding: "10px", color: "#374151", maxWidth: 140, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.location || "—"}</td>
              <td style={{ padding: "10px", color: "#374151", whiteSpace: "nowrap" }}>{fmt(p.shootDate)}</td>
              <td style={{ padding: "10px", whiteSpace: "nowrap" }}>
                <span style={{ color: isOverdue ? "#EF4444" : isSoon ? "#F59E0B" : "#374151", fontWeight: isOverdue || isSoon ? 600 : 400 }}>
                  {fmt(p.deliveryDeadline)}
                  {isOverdue && " ⚠"}
                  {isSoon && !isOverdue && " 🔔"}
                </span>
              </td>
              <td style={{ padding: "10px" }}><StatusBadge status={p.status} /></td>
              <td style={{ padding: "10px" }}><PriBadge p={p.priority} /></td>
              <td style={{ padding: "10px", minWidth: 120 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ flex: 1 }}><ProgressBar pct={calcProgress(p.tasks)} /></div>
                  <span style={{ fontSize: 11, color: "#6B7280", whiteSpace: "nowrap" }}>{calcProgress(p.tasks)}%</span>
                </div>
              </td>
            </tr>
          );
        })}
      </tbody>
    </table>
  );
}

  const [showTemplateModal, setShowTemplateModal] = useState(false);

  const filtered = useMemo(() => projects.filter(p => {
    const q = search.toLowerCase();
    const matchSearch = !q || p.name.toLowerCase().includes(q) || p.client.toLowerCase().includes(q);
    const matchStatus = filterStatus === "All" || p.status === filterStatus;
    const matchPri = filterPriority === "All" || p.priority === filterPriority;
    const matchType = filterType === "All" || p.jobType === filterType;
    return matchSearch && matchStatus && matchPri && matchType;
  }), [projects, search, filterStatus, filterPriority, filterType]);

  const sel = s => ({ padding: "8px 12px", borderRadius: 8, border: "1px solid #E5E7EB", fontSize: 13, color: "#374151", background: "#FAFAFA", cursor: "pointer" });

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h1 style={{ fontSize: 22, fontWeight: 800, margin: 0 }}>Projects</h1>
        <div style={{ display: "flex", gap: 10 }}>
          <button style={styles.btn("secondary")} onClick={() => setShowTemplateModal(true)}>📋 Use Template</button>
          <button style={styles.btn()} onClick={() => setShowNewModal(true)}>+ New Project</button>
        </div>
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
        <input style={{ ...styles.input, maxWidth: 240 }} placeholder="🔍 Search projects..." value={search} onChange={e => setSearch(e.target.value)} />
        <select style={sel()} value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
          <option>All</option>
          {PROJECT_STATUSES.map(s => <option key={s}>{s}</option>)}
        </select>
        <select style={sel()} value={filterPriority} onChange={e => setFilterPriority(e.target.value)}>
          <option>All</option>
          {PRIORITIES.map(p => <option key={p}>{p}</option>)}
        </select>
        <select style={sel()} value={filterType} onChange={e => setFilterType(e.target.value)}>
          <option>All</option>
          {JOB_TYPES.map(t => <option key={t}>{t}</option>)}
        </select>
      </div>

      <div style={styles.card}>
        <ProjectTable
          projects={filtered}
          onSelect={p => { setSelectedProject(p); setView("project_detail"); }}
        />
        {filtered.length === 0 && (
          <div style={{ textAlign: "center", padding: "2rem", color: "#9CA3AF" }}>No projects match your filters.</div>
        )}
      </div>

      {showNewModal && (
        <NewProjectModal
          onClose={() => setShowNewModal(false)}
          onCreate={proj => {
            proj.tasks = makeTasks();
            setProjects(prev => [proj, ...prev]);
            setShowNewModal(false);
          }}
        />
      )}
      {showTemplateModal && (
        <TemplateModal
          onClose={() => setShowTemplateModal(false)}
          onCreate={proj => {
            proj.tasks = makeTasks();
            setProjects(prev => [proj, ...prev]);
            setShowTemplateModal(false);
          }}
        />
      )}
    </div>
  );
}

// ─── Tasks View ───────────────────────────────────────────────────────────────
function TasksView({ proj, save }) {
  const [expanded, setExpanded] = useState(
    Object.fromEntries(STAGE_KEYS.map(k => [k, true]))
  );
  const [adding, setAdding] = useState(null); // stageKey being typed into
  const [addTitle, setAddTitle] = useState("");
  const [expandedTask, setExpandedTask] = useState(null); // taskId with details open

  const toggleStage = k => setExpanded(e => ({ ...e, [k]: !e[k] }));

  const updateTask = (stageKey, taskId, changes) =>
    save({
      ...proj,
      tasks: {
        ...proj.tasks,
        [stageKey]: proj.tasks[stageKey].map(t =>
          t.id === taskId ? { ...t, ...changes } : t
        ),
      },
    });

  const addTask = stageKey => {
    if (!addTitle.trim()) return;
    save({
      ...proj,
      tasks: {
        ...proj.tasks,
        [stageKey]: [...proj.tasks[stageKey], makeTask(addTitle.trim())],
      },
    });
    setAddTitle("");
    setAdding(null);
  };

  const removeTask = (stageKey, taskId) =>
    save({
      ...proj,
      tasks: {
        ...proj.tasks,
        [stageKey]: proj.tasks[stageKey].filter(t => t.id !== taskId),
      },
    });

  const totalAll = STAGE_KEYS.flatMap(k => proj.tasks[k]).length;
  const doneAll  = STAGE_KEYS.flatMap(k => proj.tasks[k]).filter(t => t.completed).length;
  const [confirmClear, setConfirmClear] = useState(false);

  const clearCompleted = () => {
    const cleaned = Object.fromEntries(
      STAGE_KEYS.map(k => [k, proj.tasks[k].filter(t => !t.completed)])
    );
    save({ ...proj, tasks: cleaned });
    setConfirmClear(false);
  };

  return (
    <div>
      {/* Overall mini-bar */}
      <div style={{ ...styles.card, marginBottom: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: doneAll > 0 ? 14 : 0 }}>
          <div style={{ fontSize: 13, color: "#6B7280", whiteSpace: "nowrap" }}>Overall</div>
          <div style={{ flex: 1 }}><ProgressBar pct={totalAll ? (doneAll / totalAll) * 100 : 0} height={8} /></div>
          <div style={{ fontSize: 13, fontWeight: 700, color: BRAND, whiteSpace: "nowrap" }}>{doneAll}/{totalAll} done</div>
        </div>

        {doneAll > 0 && (
          <div style={{
            borderTop: "1px solid #F1F1F1", paddingTop: 12,
            display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{
                width: 24, height: 24, borderRadius: "50%", background: "#DCFCE7",
                display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
              }}>
                <span style={{ fontSize: 12, color: "#16A34A" }}>✓</span>
              </div>
              <span style={{ fontSize: 13, color: "#374151" }}>
                <strong style={{ color: "#16A34A" }}>{doneAll} completed {doneAll === 1 ? "task" : "tasks"}</strong>
                {" "}across all stages
              </span>
            </div>
            {!confirmClear ? (
              <button
                onClick={() => setConfirmClear(true)}
                style={{
                  display: "flex", alignItems: "center", gap: 6,
                  padding: "6px 14px", borderRadius: 8, border: "1px solid #FECACA",
                  background: "#FEF2F2", color: "#DC2626", fontSize: 12, fontWeight: 600,
                  cursor: "pointer", whiteSpace: "nowrap", transition: "all 0.15s",
                }}
                onMouseEnter={e => { e.currentTarget.style.background = "#FEE2E2"; }}
                onMouseLeave={e => { e.currentTarget.style.background = "#FEF2F2"; }}
              >
                🗑 Delete completed tasks
              </button>
            ) : (
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 12, color: "#6B7280" }}>Remove {doneAll} tasks permanently?</span>
                <button
                  onClick={clearCompleted}
                  style={{
                    padding: "6px 14px", borderRadius: 8, border: "none",
                    background: "#DC2626", color: "#fff", fontSize: 12, fontWeight: 600,
                    cursor: "pointer",
                  }}
                >Yes, delete</button>
                <button
                  onClick={() => setConfirmClear(false)}
                  style={{
                    padding: "6px 12px", borderRadius: 8, border: "1px solid #E5E7EB",
                    background: "#fff", color: "#6B7280", fontSize: 12, fontWeight: 500,
                    cursor: "pointer",
                  }}
                >Cancel</button>
              </div>
            )}
          </div>
        )}
      </div>

      {STAGE_KEYS.map((key, si) => {
        const stageTasks = proj.tasks[key] || [];
        const done = stageTasks.filter(t => t.completed).length;
        const pct  = stageTasks.length ? Math.round(done / stageTasks.length * 100) : 0;

        return (
          <div key={key} style={{ ...styles.card, marginBottom: 16 }}>

            {/* Stage header */}
            <div
              onClick={() => toggleStage(key)}
              style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer",
                marginBottom: expanded[key] ? 14 : 0 }}
            >
              <span style={{ fontSize: 13, color: "#9CA3AF" }}>{expanded[key] ? "▾" : "▸"}</span>
              <h3 style={{ margin: 0, fontSize: 14, fontWeight: 700, flex: 1, color: "#111" }}>
                {STAGE_LABELS[si]}
              </h3>
              <span style={{ fontSize: 11, color: "#9CA3AF" }}>{done}/{stageTasks.length}</span>
              <div style={{ width: 80 }}><ProgressBar pct={pct} height={5} /></div>
            </div>

            {expanded[key] && (
              <div>
                {/* Column headers (shown only if there are tasks) */}
                {stageTasks.length > 0 && (
                  <div style={{
                    display: "grid",
                    gridTemplateColumns: "20px 1fr 110px 120px 90px 120px 60px 28px",
                    gap: 8, padding: "0 0 6px", marginBottom: 4,
                    borderBottom: "1px solid #F1F1F1",
                  }}>
                    {["","Task","Due date","Status","Priority","Assigned","",""].map((h, i) => (
                      <div key={i} style={{ fontSize: 10, color: "#9CA3AF", fontWeight: 600,
                        textTransform: "uppercase", letterSpacing: 0.4 }}>{h}</div>
                    ))}
                  </div>
                )}

                {/* Task rows */}
                {stageTasks.map(task => (
                  <InlineTaskRow
                    key={task.id}
                    task={task}
                    isExpanded={expandedTask === task.id}
                    onToggleExpand={() => setExpandedTask(expandedTask === task.id ? null : task.id)}
                    onChange={changes => updateTask(key, task.id, changes)}
                    onToggleComplete={() => updateTask(key, task.id, {
                      completed: !task.completed,
                      status: !task.completed ? "Completed" : "Not Started",
                    })}
                    onRemove={() => removeTask(key, task.id)}
                  />
                ))}

                {/* Add task row */}
                {adding === key ? (
                  <div style={{ display: "flex", gap: 8, marginTop: 8, alignItems: "center" }}>
                    <div style={{ width: 20 }} />
                    <input
                      autoFocus
                      style={{ ...styles.input, flex: 1, fontSize: 13 }}
                      placeholder="Task title — press Enter to add"
                      value={addTitle}
                      onChange={e => setAddTitle(e.target.value)}
                      onKeyDown={e => {
                        if (e.key === "Enter") addTask(key);
                        if (e.key === "Escape") { setAdding(null); setAddTitle(""); }
                      }}
                    />
                    <button style={{ ...styles.btn(), padding: "7px 14px", fontSize: 12 }}
                      onClick={() => addTask(key)}>Add</button>
                    <button style={{ ...styles.btn("ghost"), padding: "7px 10px" }}
                      onClick={() => { setAdding(null); setAddTitle(""); }}>✕</button>
                  </div>
                ) : (
                  <button
                    style={{
                      display: "flex", alignItems: "center", gap: 6, marginTop: 10,
                      background: "none", border: `1px dashed #E5E7EB`, borderRadius: 8,
                      padding: "7px 14px", cursor: "pointer", color: "#9CA3AF",
                      fontSize: 12, fontWeight: 500, width: "100%", transition: "all 0.15s",
                    }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = BRAND; e.currentTarget.style.color = BRAND; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = "#E5E7EB"; e.currentTarget.style.color = "#9CA3AF"; }}
                    onClick={() => { setAdding(key); setAddTitle(""); }}
                  >
                    + Add subtask
                  </button>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── Inline Task Row ──────────────────────────────────────────────────────────
function InlineTaskRow({ task, isExpanded, onToggleExpand, onChange, onToggleComplete, onRemove }) {
  const isOverdue = task.dueDate && daysUntil(task.dueDate) < 0 && !task.completed;

  const cellBase = {
    fontSize: 12, color: "#374151", background: "none", border: "none",
    outline: "none", width: "100%", fontFamily: "inherit",
  };

  const selectStyle = {
    ...cellBase,
    cursor: "pointer", borderRadius: 6, padding: "3px 4px",
    border: "1px solid transparent",
  };

  return (
    <div style={{ borderBottom: "1px solid #F9FAFB" }}>
      {/* Main row */}
      <div style={{
        display: "grid",
        gridTemplateColumns: "20px 1fr 110px 120px 90px 120px 60px 28px",
        gap: 8, alignItems: "center", padding: "7px 0",
        opacity: task.completed ? 0.55 : 1,
        transition: "opacity 0.15s",
      }}>

        {/* Checkbox */}
        <input type="checkbox" checked={task.completed} onChange={onToggleComplete}
          style={{ width: 15, height: 15, accentColor: BRAND, cursor: "pointer", margin: 0 }} />

        {/* Title — inline editable */}
        <input
          style={{
            ...cellBase, fontSize: 13, fontWeight: 500,
            textDecoration: task.completed ? "line-through" : "none",
            color: task.completed ? "#9CA3AF" : "#111",
            padding: "3px 6px", borderRadius: 6,
            border: "1px solid transparent",
          }}
          value={task.title}
          placeholder="Task name…"
          onChange={e => onChange({ title: e.target.value })}
          onFocus={e => { e.target.style.border = `1px solid ${BRAND}40`; e.target.style.background = "#FAFAFA"; }}
          onBlur={e => { e.target.style.border = "1px solid transparent"; e.target.style.background = "none"; }}
        />

        {/* Due date */}
        <input
          type="date"
          style={{
            ...cellBase, cursor: "pointer",
            color: isOverdue ? "#EF4444" : task.dueDate ? "#374151" : "#C4C4C4",
            fontSize: 11, padding: "3px 4px", borderRadius: 6,
            border: "1px solid transparent",
          }}
          value={task.dueDate}
          onChange={e => onChange({ dueDate: e.target.value })}
          onFocus={e => e.target.style.border = `1px solid ${BRAND}40`}
          onBlur={e => e.target.style.border = "1px solid transparent"}
        />

        {/* Status */}
        <select
          style={{
            ...selectStyle,
            color: taskStatusColors[task.status] || "#6B7280",
            fontWeight: 600, fontSize: 11,
          }}
          value={task.status}
          onChange={e => onChange({ status: e.target.value,
            completed: e.target.value === "Completed",
          })}
          onFocus={e => e.target.style.border = `1px solid ${BRAND}40`}
          onBlur={e => e.target.style.border = "1px solid transparent"}
        >
          {TASK_STATUSES.map(s => <option key={s}>{s}</option>)}
        </select>

        {/* Priority */}
        <select
          style={{ ...selectStyle, color: priorityColors[task.priority] || "#6B7280", fontWeight: 600, fontSize: 11 }}
          value={task.priority}
          onChange={e => onChange({ priority: e.target.value })}
          onFocus={e => e.target.style.border = `1px solid ${BRAND}40`}
          onBlur={e => e.target.style.border = "1px solid transparent"}
        >
          {PRIORITIES.map(p => <option key={p}>{p}</option>)}
        </select>

        {/* Assigned */}
        <select
          style={{ ...selectStyle, fontSize: 11, color: task.assignedTo ? "#374151" : "#C4C4C4" }}
          value={task.assignedTo}
          onChange={e => onChange({ assignedTo: e.target.value })}
          onFocus={e => e.target.style.border = `1px solid ${BRAND}40`}
          onBlur={e => e.target.style.border = "1px solid transparent"}
        >
          <option value="">Unassigned</option>
          {TEAM_MEMBERS.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
        </select>

        {/* Expand details toggle */}
        <button
          onClick={onToggleExpand}
          title="Notes / description"
          style={{
            background: isExpanded ? BRAND_LIGHT : "none", border: "none", cursor: "pointer",
            color: isExpanded ? BRAND : "#C4C4C4", borderRadius: 5, padding: "3px 6px",
            fontSize: 13, transition: "all 0.15s",
          }}
        >
          ≡
        </button>

        {/* Remove */}
        <button
          onClick={onRemove}
          style={{
            background: "none", border: "none", cursor: "pointer",
            color: "#D1D5DB", fontSize: 16, padding: "2px 4px",
            borderRadius: 4, transition: "color 0.15s",
          }}
          onMouseEnter={e => e.currentTarget.style.color = "#EF4444"}
          onMouseLeave={e => e.currentTarget.style.color = "#D1D5DB"}
        >×</button>
      </div>

      {/* Expandable detail panel */}
      {isExpanded && (
        <div style={{
          marginLeft: 28, marginBottom: 10, padding: "10px 12px",
          background: "#FAFAFA", borderRadius: 8, border: "1px solid #F1F1F1",
        }}>
          <div style={{ marginBottom: 8 }}>
            <label style={{ fontSize: 11, color: "#9CA3AF", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: 0.4 }}>Description</label>
            <textarea
              style={{
                ...styles.input, height: 60, fontSize: 12, resize: "vertical",
                background: "#fff",
              }}
              placeholder="Add a description or notes…"
              value={task.description}
              onChange={e => onChange({ description: e.target.value })}
            />
          </div>
          <div>
            <label style={{ fontSize: 11, color: "#9CA3AF", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: 0.4 }}>Comments / call notes</label>
            <textarea
              style={{
                ...styles.input, height: 50, fontSize: 12, resize: "vertical",
                background: "#fff",
              }}
              placeholder="Log a comment or update…"
              value={task.comments}
              onChange={e => onChange({ comments: e.target.value })}
            />
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Files View ───────────────────────────────────────────────────────────────
function FilesView({ proj, save }) {
  const [newLabel, setNewLabel] = useState("");
  const [newUrl, setNewUrl] = useState("");

  const addLink = () => {
    if (!newLabel.trim() || !newUrl.trim()) return;
    save({ ...proj, links: [...(proj.links || []), { label: newLabel.trim(), url: newUrl.trim() }] });
    setNewLabel(""); setNewUrl("");
  };

  const removeLink = (i) => save({ ...proj, links: proj.links.filter((_, idx) => idx !== i) });

  const platform = url => {
    if (url.includes("drive.google")) return { name: "Google Drive", color: "#4285F4" };
    if (url.includes("dropbox")) return { name: "Dropbox", color: "#0061FF" };
    if (url.includes("frame.io")) return { name: "Frame.io", color: "#292929" };
    if (url.includes("vimeo")) return { name: "Vimeo", color: "#1AB7EA" };
    return { name: "Link", color: "#6B7280" };
  };

  return (
    <div style={styles.card}>
      <h3 style={{ fontSize: 15, fontWeight: 700, margin: "0 0 16px" }}>Files & Links</h3>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 12, marginBottom: 20 }}>
        {(proj.links || []).map((link, i) => {
          const p = platform(link.url);
          return (
            <div key={i} style={{ border: "1px solid #E5E7EB", borderRadius: 10, padding: 14, position: "relative" }}>
              <div style={{ display: "flex", align: "center", gap: 8, marginBottom: 6 }}>
                <span style={{ background: p.color + "22", color: p.color, fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 20 }}>{p.name}</span>
              </div>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#111", marginBottom: 4 }}>{link.label}</div>
              <a href={link.url} target="_blank" rel="noreferrer" style={{ fontSize: 12, color: BRAND }}>Open →</a>
              <button onClick={() => removeLink(i)}
                style={{ position: "absolute", top: 8, right: 8, background: "none", border: "none", cursor: "pointer", color: "#9CA3AF", fontSize: 16 }}>×</button>
            </div>
          );
        })}
      </div>
      <div style={{ borderTop: "1px solid #F1F1F1", paddingTop: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 10 }}>Add Link</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <input style={{ ...styles.input, flex: 1, minWidth: 180 }} placeholder="Label (e.g. Frame.io Preview)" value={newLabel} onChange={e => setNewLabel(e.target.value)} />
          <input style={{ ...styles.input, flex: 2, minWidth: 220 }} placeholder="URL" value={newUrl} onChange={e => setNewUrl(e.target.value)}
            onKeyDown={e => e.key === "Enter" && addLink()} />
          <button style={styles.btn()} onClick={addLink}>Add</button>
        </div>
      </div>
    </div>
  );
}

}

// ─── Calendar View ────────────────────────────────────────────────────────────
function CalendarView({ projects }) {
  const today = new Date();
  const [year, setYear] = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const prevMonth = () => { if (month === 0) { setMonth(11); setYear(y => y - 1); } else setMonth(m => m - 1); };
  const nextMonth = () => { if (month === 11) { setMonth(0); setYear(y => y + 1); } else setMonth(m => m + 1); };

  const eventsForDay = (day) => {
    const d = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    const events = [];
    projects.forEach(p => {
      if (p.shootDate === d) events.push({ label: p.name, type: "shoot", color: "#3B82F6" });
      if (p.deliveryDeadline === d) events.push({ label: p.name, type: "deadline", color: daysUntil(d) < 0 ? "#EF4444" : "#E31B25" });
    });
    return events;
  };

  const monthName = new Date(year, month).toLocaleString("en-GB", { month: "long" });

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h1 style={{ fontSize: 22, fontWeight: 800, margin: 0 }}>Calendar</h1>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button style={styles.btn("secondary")} onClick={prevMonth}>←</button>
          <span style={{ fontWeight: 700, fontSize: 16 }}>{monthName} {year}</span>
          <button style={styles.btn("secondary")} onClick={nextMonth}>→</button>
        </div>
      </div>

      <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
        {[["#3B82F6","Shoot Day"],["#E31B25","Delivery Deadline"]].map(([c,l]) => (
          <div key={l} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#6B7280" }}>
            <div style={{ width: 10, height: 10, borderRadius: 2, background: c }} />
            {l}
          </div>
        ))}
      </div>

      <div style={styles.card}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 1, marginBottom: 8 }}>
          {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => (
            <div key={d} style={{ textAlign: "center", fontSize: 11, fontWeight: 700, color: "#9CA3AF", padding: "4px 0" }}>{d}</div>
          ))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 2 }}>
          {Array.from({ length: firstDay }).map((_, i) => <div key={`e${i}`} />)}
          {Array.from({ length: daysInMonth }).map((_, i) => {
            const day = i + 1;
            const isToday = day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
            const events = eventsForDay(day);
            return (
              <div key={day} style={{
                minHeight: 72, padding: "6px", borderRadius: 8,
                background: isToday ? BRAND_LIGHT : "#FAFAFA",
                border: `1px solid ${isToday ? BRAND : "#F1F1F1"}`,
              }}>
                <div style={{ fontSize: 12, fontWeight: isToday ? 700 : 400, color: isToday ? BRAND : "#374151", marginBottom: 4 }}>{day}</div>
                {events.map((ev, ei) => (
                  <div key={ei} style={{
                    fontSize: 10, padding: "2px 4px", borderRadius: 4,
                    background: ev.color, color: "#fff", marginBottom: 2,
                    overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                  }}>{ev.label}</div>
                ))}
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ ...styles.card, marginTop: 20 }}>
        <h3 style={{ fontSize: 15, fontWeight: 700, margin: "0 0 14px" }}>Upcoming Deadlines</h3>
        {projects
          .filter(p => p.deliveryDeadline && daysUntil(p.deliveryDeadline) !== null && daysUntil(p.deliveryDeadline) <= 30)
          .sort((a, b) => new Date(a.deliveryDeadline) - new Date(b.deliveryDeadline))
          .map(p => {
            const d = daysUntil(p.deliveryDeadline);
            return (
              <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: "1px solid #F9FAFB" }}>
                <div style={{ width: 40, height: 40, borderRadius: 8, background: d < 0 ? "#FEF2F2" : d <= 3 ? "#FEF3C7" : BRAND_LIGHT, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <span style={{ fontSize: 11, fontWeight: 800, color: d < 0 ? "#EF4444" : d <= 3 ? "#F59E0B" : BRAND }}>{d < 0 ? "OD" : `${d}d`}</span>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{p.name}</div>
                  <div style={{ fontSize: 11, color: "#6B7280" }}>{p.client} · Due {fmt(p.deliveryDeadline)}</div>
                </div>
                <StatusBadge status={p.status} />
              </div>
            );
          })}
      </div>
    </div>
  );
}

// ─── Analytics ────────────────────────────────────────────────────────────────
function Analytics({ projects }) {
  const statusCounts = {};
  PROJECT_STATUSES.forEach(s => { statusCounts[s] = projects.filter(p => p.status === s).length; });
  const totalTasks = projects.reduce((sum, p) => sum + STAGE_KEYS.flatMap(k => p.tasks[k]).length, 0);
  const doneTasks = projects.reduce((sum, p) => sum + STAGE_KEYS.flatMap(k => p.tasks[k]).filter(t => t.completed).length, 0);

  const maxStatus = Math.max(...Object.values(statusCounts), 1);

  return (
    <div>
      <h1 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 20px" }}>Analytics</h1>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16, marginBottom: 24 }}>
        {[
          { label: "Total Projects", value: projects.length, color: "#6366F1" },
          { label: "Tasks Completed", value: `${doneTasks}/${totalTasks}`, color: "#10B981" },
          { label: "Active Projects", value: projects.filter(p => !["Delivered","Archived"].includes(p.status)).length, color: BRAND },
        ].map(s => (
          <div key={s.label} style={{ ...styles.card, borderTop: `3px solid ${s.color}` }}>
            <div style={{ fontSize: 24, fontWeight: 800, color: s.color }}>{s.value}</div>
            <div style={{ fontSize: 13, color: "#6B7280", marginTop: 2 }}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 20 }}>
        <div style={styles.card}>
          <h3 style={{ fontSize: 14, fontWeight: 700, margin: "0 0 16px" }}>Projects by Status</h3>
          {PROJECT_STATUSES.filter(s => statusCounts[s] > 0).map(s => (
            <div key={s} style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                <StatusBadge status={s} />
                <span style={{ color: "#6B7280" }}>{statusCounts[s]}</span>
              </div>
              <ProgressBar pct={(statusCounts[s] / maxStatus) * 100} color={statusColors[s] || "#6B7280"} />
            </div>
          ))}
        </div>
        <div style={styles.card}>
          <h3 style={{ fontSize: 14, fontWeight: 700, margin: "0 0 16px" }}>Task Completion by Stage</h3>
          {STAGE_KEYS.map((k, i) => {
            const all = projects.flatMap(p => p.tasks[k] || []);
            const done = all.filter(t => t.completed).length;
            const pct = all.length ? Math.round(done / all.length * 100) : 0;
            return (
              <div key={k} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                  <span style={{ color: "#374151" }}>{STAGE_LABELS[i]}</span>
                  <span style={{ color: "#6B7280" }}>{done}/{all.length} ({pct}%)</span>
                </div>
                <ProgressBar pct={pct} />
              </div>
            );
          })}
        </div>
      </div>

      <div style={styles.card}>
        <h3 style={{ fontSize: 14, fontWeight: 700, margin: "0 0 16px" }}>Projects by Type</h3>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 10 }}>
          {JOB_TYPES.map(t => {
            const count = projects.filter(p => p.jobType === t).length;
            if (!count) return null;
            return (
              <div key={t} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                  <span style={{ color: "#374151" }}>{t}</span>
                  <span style={{ color: "#6B7280" }}>{count}</span>
                </div>
                <ProgressBar pct={(count / projects.length) * 100} color="#6366F1" />
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// Each project is stored as a row: { id, data: {...}, updated_at }
async function dbLoad() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/projects?select=id,data`, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
    },
  });
  if (!res.ok) throw new Error("Load failed");
  const rows = await res.json();
  return rows.length ? rows.map(r => r.data) : null;
}

async function dbSaveProject(project) {
  await fetch(`${SUPABASE_URL}/rest/v1/projects`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      "Content-Type": "application/json",
      Prefer: "resolution=merge-duplicates",
    },
    body: JSON.stringify({ id: project.id, data: project, updated_at: new Date().toISOString() }),
  });
}

async function dbDeleteProject(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/projects?id=eq.${id}`, {
    method: "DELETE",
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
    },
  });
}

// ─── App Shell ────────────────────────────────────────────────────────────────
const configured = SUPABASE_URL !== "YOUR_SUPABASE_URL";

function App() {
  const [view, setView] = useState("dashboard");
  const [projects, setProjects] = useState(null);
  const [selectedProject, setSelectedProject] = useState(null);
  const [syncStatus, setSyncStatus] = useState("loading");
  const loadedRef = React.useRef(false);

  // On mount: load from Supabase first, fall back to localStorage
  useEffect(() => {
    if (!configured) {
      try {
        const saved = localStorage.getItem("nsg_local");
        setProjects(saved ? JSON.parse(saved) : INITIAL_PROJECTS);
      } catch { setProjects(INITIAL_PROJECTS); }
      setSyncStatus("idle");
      loadedRef.current = true;
      return;
    }
    setSyncStatus("loading");
    dbLoad()
      .then(rows => {
        if (rows && rows.length > 0) {
          setProjects(rows);
        } else {
          setProjects(INITIAL_PROJECTS);
          INITIAL_PROJECTS.forEach(p => dbSaveProject(p));
        }
        setSyncStatus("idle");
        loadedRef.current = true;
      })
      .catch(() => {
        try {
          const saved = localStorage.getItem("nsg_local");
          setProjects(saved ? JSON.parse(saved) : INITIAL_PROJECTS);
        } catch { setProjects(INITIAL_PROJECTS); }
        setSyncStatus("error");
        loadedRef.current = true;
      });
  }, []);

  // Save to Supabase whenever projects change (skip initial load)
  useEffect(() => {
    if (projects === null) return;
    if (!loadedRef.current) return;
    try { localStorage.setItem("nsg_local", JSON.stringify(projects)); } catch {}
    if (!configured) return;
    setSyncStatus("saving");
    Promise.all(projects.map(p => dbSaveProject(p)))
      .then(() => setSyncStatus("idle"))
      .catch(() => setSyncStatus("error"));
  }, [projects]);

  // Sync selected project when projects update
  useEffect(() => {
    if (selectedProject && projects) {
      const updated = projects.find(p => p.id === selectedProject.id);
      if (updated) setSelectedProject(updated);
    }
  }, [projects]);

  const SyncIndicator = () => {
    if (!configured) return (
      <div style={{ padding: "6px 12px", background: "#FEF3C7", borderRadius: 8,
        fontSize: 11, color: "#92400E", fontWeight: 600 }}>
        ⚠ Local only — add Supabase keys to sync across devices
      </div>
    );
    if (syncStatus === "loading") return (
      <div style={{ padding: "6px 12px", background: "#EFF6FF", borderRadius: 8,
        fontSize: 11, color: "#1D4ED8", fontWeight: 600 }}>◌ Loading…</div>
    );
    if (syncStatus === "saving") return (
      <div style={{ padding: "6px 12px", background: "#F0FDF4", borderRadius: 8,
        fontSize: 11, color: "#15803D", fontWeight: 600 }}>↑ Saving…</div>
    );
    if (syncStatus === "error") return (
      <div style={{ padding: "6px 12px", background: "#FEF2F2", borderRadius: 8,
        fontSize: 11, color: "#B91C1C", fontWeight: 600 }}>⚠ Sync error</div>
    );
    return (
      <div style={{ padding: "6px 12px", background: "#F0FDF4", borderRadius: 8,
        fontSize: 11, color: "#15803D", fontWeight: 600 }}>✓ Synced</div>
    );
  };

  if (projects === null) {
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center",
        minHeight: "100vh", background: "#F7F7F8", flexDirection: "column", gap: 16 }}>
        <div style={{ width: 40, height: 40, borderRadius: 10, background: BRAND,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 20, fontWeight: 900, color: "#fff" }}>▶</div>
        <div style={{ fontSize: 14, color: "#6B7280", fontWeight: 500 }}>Loading NSG Video Project Tracker…</div>
      </div>
    );
  }

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "#F7F7F8", fontFamily: "'DM Sans', system-ui, sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
      <Nav view={view} setView={v => { setView(v); setSelectedProject(null); }} projects={projects} />
      <main style={{ flex: 1, padding: "2rem", overflowY: "auto", minHeight: "100vh" }}>
        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 12 }}>
          <SyncIndicator />
        </div>
        {view === "dashboard" && (
          <Dashboard projects={projects} setView={setView} setSelectedProject={setSelectedProject} />
        )}
        {view === "projects" && (
          <ProjectsView projects={projects} setProjects={setProjects} setSelectedProject={setSelectedProject} setView={setView} />
        )}
        {view === "project_detail" && selectedProject && (
          <ProjectDetail
            project={selectedProject}
            setProjects={setProjects}
            onBack={() => setView("projects")}
          />
        )}
        {view === "calendar" && <CalendarView projects={projects} />}
        {view === "analytics" && <Analytics projects={projects} />}
      </main>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
